name: Capture Hemispheric Power

on:
  schedule:
    - cron: '58 23 * * *'   # 23:58 UTC — 2 min before NOAA midnight reset
  workflow_dispatch:          # allow manual trigger for testing

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and update hemispheric power data
        run: |
          set -e
          NOAA_URL="https://services.swpc.noaa.gov/text/aurora-nowcast-hemi-power.txt"
          DATA_FILE="data/hemispheric_power_history.json"
          TODAY=$(date -u +%Y-%m-%d)
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          CUTOFF=$(date -u -d "3 days ago" +%Y-%m-%d)

          # Fetch NOAA data
          NOAA_RAW=$(curl -s --fail "$NOAA_URL")

          # Parse into JSON array of readings using Python
          READINGS=$(python3 - <<'PYEOF'
          import sys, json, re
          raw = """$NOAA_RAW"""
          readings = []
          for line in raw.splitlines():
              line = line.strip()
              if not line or line.startswith('#') or line.startswith('-'):
                  continue
              parts = re.split(r'\s+', line)
              if len(parts) < 4:
                  continue
              try:
                  north = float(parts[2])
                  south = float(parts[3])
                  iso_time = parts[0].replace('_', 'T') + ':00Z'
                  readings.append({"time": iso_time, "north": north, "south": south})
              except ValueError:
                  continue
          print(json.dumps(readings))
          PYEOF
          )

          # Load or init history JSON
          mkdir -p data
          if [ -f "$DATA_FILE" ]; then
            HISTORY=$(cat "$DATA_FILE")
          else
            HISTORY='{"updated_at":"","days":{}}'
          fi

          # Upsert today and prune old days using Python
          python3 - <<PYEOF
          import json, sys

          today = "$TODAY"
          cutoff = "$CUTOFF"
          now = "$NOW"
          readings = json.loads('''$READINGS''')
          history = json.loads('''$HISTORY''')

          days = history.get("days", {})
          days[today] = {"date": today, "captured_at": now, "readings": readings}

          # Prune entries older than cutoff
          days = {k: v for k, v in days.items() if k >= cutoff}

          result = {"updated_at": now, "days": days}
          with open("$DATA_FILE", "w") as f:
              json.dump(result, f, separators=(',', ':'))
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hemispheric_power_history.json
          git diff --cached --quiet || git commit -m "chore: capture hemispheric power $(date -u +%Y-%m-%d)"
          git push

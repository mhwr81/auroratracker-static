name: Capture Hemispheric Power

on:
  schedule:
    - cron: '58 23 * * *'
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and update hemispheric power data
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, re
          from datetime import datetime, timezone, timedelta

          NOAA_URL = "https://services.swpc.noaa.gov/text/aurora-nowcast-hemi-power.txt"
          DATA_FILE = "data/hemispheric_power_history.json"
          DAYS_TO_KEEP = 3

          req = urllib.request.Request(NOAA_URL, headers={"User-Agent": "AuroraTracker/1.0"})
          with urllib.request.urlopen(req, timeout=15) as resp:
              raw = resp.read().decode("utf-8")

          readings = []
          for line in raw.splitlines():
              line = line.strip()
              if not line or line.startswith("#") or line.startswith("-") or "UTC_Time" in line:
                  continue
              parts = re.split(r"\s+", line)
              if len(parts) < 4:
                  continue
              try:
                  north = float(parts[2])
                  south = float(parts[3])
                  iso_time = parts[0].replace("_", "T") + ":00Z"
                  readings.append({"time": iso_time, "north": north, "south": south})
              except ValueError:
                  continue

          now = datetime.now(timezone.utc)
          today = now.strftime("%Y-%m-%d")
          now_str = now.strftime("%Y-%m-%dT%H:%M:%SZ")
          cutoff = (now - timedelta(days=DAYS_TO_KEEP)).strftime("%Y-%m-%d")

          os.makedirs("data", exist_ok=True)
          if os.path.exists(DATA_FILE):
              with open(DATA_FILE) as f:
                  history = json.load(f)
          else:
              history = {"updated_at": "", "days": {}}

          days = history.get("days", {})
          days[today] = {"date": today, "captured_at": now_str, "readings": readings}
          days = {k: v for k, v in days.items() if k >= cutoff}

          result = {"updated_at": now_str, "days": days}
          with open(DATA_FILE, "w") as f:
              json.dump(result, f, separators=(",", ":"))

          print(f"Captured {len(readings)} readings for {today}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hemispheric_power_history.json
          git diff --cached --quiet || git commit -m "chore: capture hemispheric power $(date -u +%Y-%m-%d)"
          git push
